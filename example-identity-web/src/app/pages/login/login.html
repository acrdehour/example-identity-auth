<div class="page">
  <header class="title-bar">IT 02-1</header>

  <main class="content-box">
    <div class="form">
      <div class="form-fields">
        <div class="form-row">
          <label for="login-user">User</label>
          <input
            id="login-user"
            type="text"
            [(ngModel)]="username">
        </div>

        <div class="form-row">
          <label for="login-password">Password</label>
          <input
            id="login-password"
            type="password"
            [(ngModel)]="password">
        </div>
      </div>

      @if (errorMessage()) {
        <p class="error-banner" role="alert">{{ errorMessage() }}</p>
      }

      <button class="btn" type="button" (click)="login()">
        ลงชื่อเข้าใช้งาน
      </button>

      <a class="link" routerLink="/register">
        สมัครสมาชิก
      </a>
    </div>
  </main>
</div>
